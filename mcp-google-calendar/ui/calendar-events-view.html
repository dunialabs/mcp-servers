<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Calendar Events View</title>
  </head>
  <body>
    <div id="app">
      <header class="page-header">
        <div>
          <p class="eyebrow">Google Calendar</p>
          <h1>Events View</h1>

    <script type="module" src="./calendar-events-view.ts"></script>
